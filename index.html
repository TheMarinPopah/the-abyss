<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE ABYSS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="menu-screen" class="screen active">
        <div class="menu-container">
            <h1 class="game-title">THE ABYSS</h1>
            <p class="subtitle">Find your way out... if you can.</p>
            <div class="menu-buttons">
                <button id="start-btn" class="btn btn-primary">START</button>
                <button id="guide-btn" class="btn btn-secondary">GUIDE</button>
            </div>
        </div>
        <div class="fog-overlay"></div>
    </div>

    <div id="guide-screen" class="screen">
        <div class="guide-container">
            <h2 class="guide-title">CONTROLS</h2>
            <div class="controls-list">
                <div class="control-item">
                    <span class="key-group">
                        <span class="key">W</span> / <span class="key">UP</span>
                    </span>
                    <span class="control-desc">Move Forward</span>
                </div>
                <div class="control-item">
                    <span class="key-group">
                        <span class="key">S</span> / <span class="key">DOWN</span>
                    </span>
                    <span class="control-desc">Move Backward</span>
                </div>
                <div class="control-item">
                    <span class="key-group">
                        <span class="key">A</span> / <span class="key">LEFT</span>
                    </span>
                    <span class="control-desc">Turn Left</span>
                </div>
                <div class="control-item">
                    <span class="key-group">
                        <span class="key">D</span> / <span class="key">RIGHT</span>
                    </span>
                    <span class="control-desc">Turn Right</span>
                </div>
            </div>
            <p class="guide-hint">Navigate through the darkness. Find the exit.</p>
            <button id="back-btn" class="btn btn-secondary">BACK</button>
        </div>
    </div>

    <div id="game-screen" class="screen">
        <div id="game-container"></div>
        <div class="hud">
            <div class="hud-item">
                <span class="hud-label">DISTANCE</span>
                <span id="distance-counter" class="hud-value">0</span>
            </div>
        </div>
        <div class="vignette"></div>
        <div class="scanlines"></div>
    </div>

    <div id="win-screen" class="screen">
        <div class="win-container">
            <h2 class="win-title">ESCAPED</h2>
            <p class="win-text">You found your way out of the abyss.</p>
            <button id="restart-btn" class="btn btn-primary">PLAY AGAIN</button>
        </div>
    </div>

    <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
